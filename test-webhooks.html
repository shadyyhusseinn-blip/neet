<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Make.com Webhooks</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      background: #16213e;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      border: 1px solid #0f3460;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 0;
    }
    button:hover {
      opacity: 0.9;
    }
    .result {
      background: #0f3460;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { border-left: 4px solid #4ade80; }
    .error { border-left: 4px solid #f87171; }
  </style>
</head>
<body>
  <h1>🧪 Test Make.com Webhooks</h1>
  <p>اختبار webhook Make.com للإشعارات</p>

  <div class="test-section">
    <h2>Test 1: Admin Notification</h2>
    <p>إرسال إشعار للإدارة عند حجز جديد</p>
    <button onclick="testAdminNotification()">إرسال إشعار الإدارة</button>
    <div id="admin-result" class="result"></div>
  </div>

  <div class="test-section">
    <h2>Test 2: Customer Notification</h2>
    <p>إرسال إشعار للعميل عند اكتمال المعرض</p>
    <button onclick="testCustomerNotification()">إرسال إشعار العميل</button>
    <div id="customer-result" class="result"></div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://hook.eu1.make.com/6q86bg4bxegqbt4fv7t9hxykdommckuv';

    async function testAdminNotification() {
      const resultDiv = document.getElementById('admin-result');
      resultDiv.textContent = 'جاري الإرسال...';
      resultDiv.className = 'result';

      const payload = {
        timestamp: new Date().toISOString(),
        source: 'shady-hussein-website',
        eventType: 'admin_notification',
        data: {
          clientName: 'أحمد محمد (اختبار)',
          phone: '+201234567890',
          eventDate: '2024-12-25',
          packageName: 'الباقة المميزة',
          eventType: 'زفاف',
          location: 'القاهرة',
          notes: 'هذا اختبار للإشعار'
        }
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });

        const result = await response.text();
        resultDiv.textContent = `✅ Success!\nStatus: ${response.status}\nResponse: ${result}`;
        resultDiv.className = 'result success';
        console.log('Admin notification sent successfully', payload);
      } catch (error) {
        resultDiv.textContent = `❌ Error: ${error.message}`;
        resultDiv.className = 'result error';
        console.error('Admin notification failed', error);
      }
    }

    async function testCustomerNotification() {
      const resultDiv = document.getElementById('customer-result');
      resultDiv.textContent = 'جاري الإرسال...';
      resultDiv.className = 'result';

      const payload = {
        timestamp: new Date().toISOString(),
        source: 'shady-hussein-website',
        eventType: 'customer_notification',
        data: {
          recipient_phone: '+201234567890',
          customer_name: 'أحمد محمد (اختبار)',
          gallery_link: 'https://photography-shady-program.web.app/gallery/test-123',
          gallery_password: '1234'
        }
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });

        const result = await response.text();
        resultDiv.textContent = `✅ Success!\nStatus: ${response.status}\nResponse: ${result}`;
        resultDiv.className = 'result success';
        console.log('Customer notification sent successfully', payload);
      } catch (error) {
        resultDiv.textContent = `❌ Error: ${error.message}`;
        resultDiv.className = 'result error';
        console.error('Customer notification failed', error);
      }
    }
  </script>
</body>
</html>
